name: Publish to VS Code Marketplace

# Publishes the extension to the Visual Studio Marketplace so releases ship
# without anyone running `vsce` by hand.
#   - Automatically when a GitHub Release is published (release-please cuts it
#     after the release PR merges).
#   - Manually via the Actions tab -> "Run workflow" (use this for the very
#     first publish, or to re-publish a version).
#
# One-time setup: add a repository secret named VSCE_PAT containing an Azure
# DevOps Personal Access Token with Organization = "All accessible
# organizations" and the "Marketplace > Manage" scope.
# (Settings -> Secrets and variables -> Actions -> New repository secret.)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Fail loudly (not silently) if the publishing token is missing or expired,
      # so a lapsed PAT surfaces as a clear red run rather than a confusing error.
      - name: Verify VSCE_PAT is configured
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::Repository secret VSCE_PAT is not set. Add it under Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run build

      # vsce reads the token from the VSCE_PAT environment variable, so the token
      # is never placed on the command line / in the logs. Publishes the current
      # package.json version (release-please has already bumped it).
      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish
